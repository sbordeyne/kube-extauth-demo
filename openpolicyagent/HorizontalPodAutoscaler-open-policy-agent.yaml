apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: open-policy-agent
  labels:
    app.kubernetes.io/name: open-policy-agent
    app.kubernetes.io/part-of: infra
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/language: go
    app.kubernetes.io/component: api
    app.kubernetes.io/instance: infra-open-policy-agent-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: open-policy-agent
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
