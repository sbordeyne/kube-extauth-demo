apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: infra
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/language: c
    app.kubernetes.io/component: db
    app.kubernetes.io/instance: infra-postgres-db
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: infra-postgres-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
