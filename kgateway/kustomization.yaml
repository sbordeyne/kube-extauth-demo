---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.6.0/standard-install.yaml
  - Namespace-kgateway-system.yaml

namespace: kgateway-system

helmCharts:
  - name: kgateway-crds
    repo: oci://cr.kgateway.dev/kgateway-dev/charts
    version: 2.3.0
    releaseName: kgateway-crds
    namespace: kgateway-system
    valuesInline: {}
  - name: kgateway
    repo: oci://cr.kgateway.dev/kgateway-dev/charts
    version: 2.3.0
    releaseName: kgateway
    namespace: kgateway-system
    valuesInline:
      controller:
        image:
          pullPolicy: Always
        extraEnv:
          KGW_ENABLE_GATEWAY_API_EXPERIMENTAL_FEATURES: "true"
