version: 2
project_name: jwt-test-server

builds:
  - id: jwt-test-server
    binary: jwt-test-server
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

# No GitHub release / archives — this pipeline only publishes container images.
release:
  disable: true

dockers:
  # ---- distroless ----
  - id: distroless-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-amd64"
      - "ghcr.io/sbordeyne/jwt-test-server:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
  - id: distroless-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-arm64"
      - "ghcr.io/sbordeyne/jwt-test-server:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
  # ---- alpine ----
  - id: alpine-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.alpine
    use: buildx
    image_templates:
      - "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-alpine-amd64"
      - "ghcr.io/sbordeyne/jwt-test-server:latest-alpine-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
  - id: alpine-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.alpine
    use: buildx
    image_templates:
      - "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-alpine-arm64"
      - "ghcr.io/sbordeyne/jwt-test-server:latest-alpine-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}"
    image_templates:
      - "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-amd64"
      - "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-arm64"
  - name_template: "ghcr.io/sbordeyne/jwt-test-server:latest"
    image_templates:
      - "ghcr.io/sbordeyne/jwt-test-server:latest-amd64"
      - "ghcr.io/sbordeyne/jwt-test-server:latest-arm64"
  - name_template: "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-alpine"
    image_templates:
      - "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-alpine-amd64"
      - "ghcr.io/sbordeyne/jwt-test-server:{{ .ShortCommit }}-alpine-arm64"
  - name_template: "ghcr.io/sbordeyne/jwt-test-server:latest-alpine"
    image_templates:
      - "ghcr.io/sbordeyne/jwt-test-server:latest-alpine-amd64"
      - "ghcr.io/sbordeyne/jwt-test-server:latest-alpine-arm64"
