name: jwt-test-server image

on:
  push:
    branches: [master]
    paths:
      - "jwt-test-server/**"
      - ".github/workflows/jwt-test-server.yaml"

concurrency:
  group: jwt-test-server-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs history for commit templating
      - uses: actions/setup-go@v5
        with:
          go-version-file: jwt-test-server/go.mod
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          workdir: jwt-test-server
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
